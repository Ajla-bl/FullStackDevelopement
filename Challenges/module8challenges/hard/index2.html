<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#visualization">Data</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <section id="home">
        <h1>Welcome Page</h1>
        <p>This is the first section of my website.</p>
    </section>

    <section id="visualization">
        <h2>Data Visualization</h2>
        <p>A simple SVG bar chart:</p>
        
        <svg width="300" height="200" style="border: 1px solid black;">
            <rect x="50" y="50" width="40" height="150" fill="blue" />
            <rect x="120" y="80" width="40" height="120" fill="red" />
            <rect x="190" y="20" width="40" height="180" fill="green" />
        </svg>
    </section>

    <section id="contact">
        <h2>Contact Us</h2>
        <form>
            <label>Name:</label><br>
            <input type="text" name="name" required><br>

            <label>Email:</label><br>
            <input type="email" name="email" required><br>

            <label>Message:</label><br>
            <textarea name="message"></textarea><br>

            <button type="submit">Send</button>
        </form>
    </section>

</body>
</html>
