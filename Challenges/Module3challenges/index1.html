<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
</head>
<body>

    <header>
        <h1>My Website</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section id="about">
            <h2>About Me</h2>
            <p>
                I enjoy exploring new technologies, hiking on the weekends, 
                and experimenting with photography. I'm also a big fan of 
                strategy games and discovering local coffee shops.
            </p>
        </section>

        <section id="contact">
            <h2>Contact Me</h2>
            <form action="#">
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" required><br><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required><br><br>

                <button type="submit">Submit</button>
            </form>
        </section>

    </main>

</body>
</html>
