<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia Experience</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        section {
            margin-bottom: 40px;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 10px;
        }
        iframe {
            max-width: 100%;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Multimedia Experience</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#media-gallery">Media Gallery</a></li>
            </ul>
        </nav>
    </header>

    <main id="media-gallery">

        <section>
            <h2>Featured Video</h2>
            <iframe width="560" height="315" 
                src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                title="YouTube video player" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </section>

        <section>
            <h2>Listen to This</h2>
            <p>Enjoy this featured audio clip:</p>
            <audio controls>
                <source src="podcast-episode.mp3" type="audio/mpeg">
                <source src="podcast-episode.ogg" type="audio/ogg">
                Your browser does not support the audio element.
            </audio>
        </section>

    </main>

</body>
</html>
